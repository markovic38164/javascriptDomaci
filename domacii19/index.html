<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Filmovi</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<form>
			<input
				type="text"
				id="movieNameInput"
				placeholder="Unesite film za pretragu"
			/>
			<input
				type="text"
				id="movieYearInput"
				placeholder="Unesite godinu filma"
			/>
			<select id="movieCategorySelect">
				<option value="movie" selected>Movie</option>
				<option value="series">Series</option>
				<option value="episode">Episode</option>
			</select>
			<button type="button" id="searchMovieButton">Pretraži</button>
		</form>
		<div id="movieContainer"></div>

		<script type="module" src="domaci.js"></script>
	</body>
</html>
